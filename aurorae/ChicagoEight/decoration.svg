<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="84" height="84" version="1.1">
  <defs>
    <!-- Active title bar: Mac OS 8 Charcoal — near-black -->
    <linearGradient id="ga" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0"    stop-color="#2E2E2E"/>
      <stop offset="0.45" stop-color="#222222"/>
      <stop offset="0.55" stop-color="#1E1E1E"/>
      <stop offset="1"    stop-color="#141414"/>
    </linearGradient>
    <!-- Inactive title bar: darker still -->
    <linearGradient id="gi" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#1E1E1E"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <!-- Side borders active -->
    <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0"    stop-color="#080808"/>
      <stop offset="0.08" stop-color="#282828"/>
      <stop offset="1"    stop-color="#282828"/>
    </linearGradient>
    <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0"    stop-color="#282828"/>
      <stop offset="0.92" stop-color="#282828"/>
      <stop offset="1"    stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0"    stop-color="#282828"/>
      <stop offset="0.9"  stop-color="#282828"/>
      <stop offset="1"    stop-color="#080808"/>
    </linearGradient>
  </defs>

  <rect id="hint-tile-center" x="0" y="0" width="1" height="1" fill="#CC6600" opacity="0"/>

  <!-- ╔══ ACTIVE ══════════════════════════════════════════════════════════╗ -->
  <g id="decoration-topleft">
    <rect x="0" y="0" width="17" height="22" fill="url(#ga)"/>
    <rect x="0" y="0" width="1"  height="22" fill="#080808"/>
    <rect x="0" y="0" width="17" height="1"  fill="#080808"/>
    <rect x="1" y="1" width="1"  height="20" fill="#707070" opacity="0.25"/>
    <rect x="1" y="1" width="15" height="1"  fill="#707070" opacity="0.25"/>
  </g>
  <g id="decoration-top">
    <rect x="17" y="0" width="50" height="22" fill="url(#ga)"/>
    <rect x="17" y="0"  width="50" height="1"  fill="#080808"/>
    <rect x="17" y="1"  width="50" height="1"  fill="#707070" opacity="0.25"/>
    <rect x="17" y="20" width="50" height="1"  fill="#2A2A2A"/>
    <rect x="17" y="21" width="50" height="1"  fill="#101010"/>
  </g>
  <g id="decoration-topright">
    <rect x="67" y="0" width="17" height="22" fill="url(#ga)"/>
    <rect x="83" y="0" width="1"  height="22" fill="#080808"/>
    <rect x="67" y="0" width="17" height="1"  fill="#080808"/>
    <rect x="82" y="1" width="1"  height="20" fill="#080808" opacity="0.4"/>
    <rect x="67" y="1" width="15" height="1"  fill="#707070" opacity="0.25"/>
  </g>
  <g id="decoration-left">
    <rect x="0" y="17" width="17" height="50" fill="url(#gl)"/>
    <rect x="0" y="17" width="1"  height="50" fill="#080808"/>
  </g>
  <g id="decoration-center">
    <rect x="17" y="17" width="50" height="50" fill="none"/>
  </g>
  <g id="decoration-right">
    <rect x="67" y="17" width="17" height="50" fill="url(#gr)"/>
    <rect x="83" y="17" width="1"  height="50" fill="#080808"/>
  </g>
  <g id="decoration-bottomleft">
    <rect x="0" y="67" width="17" height="17" fill="url(#gb)"/>
    <rect x="0" y="67" width="1"  height="17" fill="#080808"/>
    <rect x="0" y="83" width="17" height="1"  fill="#080808"/>
  </g>
  <g id="decoration-bottom">
    <rect x="17" y="67" width="50" height="17" fill="url(#gb)"/>
    <rect x="17" y="83" width="50" height="1"  fill="#080808"/>
  </g>
  <g id="decoration-bottomright">
    <rect x="67" y="67" width="17" height="17" fill="url(#gb)"/>
    <rect x="83" y="67" width="1"  height="17" fill="#080808"/>
    <rect x="67" y="83" width="17" height="1"  fill="#080808"/>
  </g>

  <!-- ╔══ MAXIMIZED ACTIVE ════════════════════════════════════════════════╗ -->
  <g id="decoration-maximized-center">
    <rect x="17" y="17" width="50" height="50" fill="url(#ga)"/>
  </g>

  <!-- ╔══ MAXIMIZED INACTIVE ══════════════════════════════════════════════╗ -->
  <g id="decoration-maximized-inactive-center">
    <rect x="17" y="17" width="50" height="50" fill="url(#gi)"/>
  </g>

  <!-- ╔══ INACTIVE ════════════════════════════════════════════════════════╗ -->
  <g id="decoration-inactive-topleft">
    <rect x="0" y="0" width="17" height="22" fill="url(#gi)"/>
    <rect x="0" y="0" width="1"  height="22" fill="#222"/>
    <rect x="0" y="0" width="17" height="1"  fill="#222"/>
  </g>
  <g id="decoration-inactive-top">
    <rect x="17" y="0"  width="50" height="22" fill="url(#gi)"/>
    <rect x="17" y="0"  width="50" height="1"  fill="#222"/>
    <rect x="17" y="21" width="50" height="1"  fill="#333"/>
  </g>
  <g id="decoration-inactive-topright">
    <rect x="67" y="0" width="17" height="22" fill="url(#gi)"/>
    <rect x="83" y="0" width="1"  height="22" fill="#222"/>
    <rect x="67" y="0" width="17" height="1"  fill="#222"/>
  </g>
  <g id="decoration-inactive-left">
    <rect x="0" y="17" width="17" height="50" fill="#181818"/>
    <rect x="0" y="17" width="1"  height="50" fill="#222"/>
  </g>
  <g id="decoration-inactive-center">
    <rect x="17" y="17" width="50" height="50" fill="none"/>
  </g>
  <g id="decoration-inactive-right">
    <rect x="67" y="17" width="17" height="50" fill="#181818"/>
    <rect x="83" y="17" width="1"  height="50" fill="#222"/>
  </g>
  <g id="decoration-inactive-bottomleft">
    <rect x="0" y="67" width="17" height="17" fill="#181818"/>
    <rect x="0" y="67" width="1"  height="17" fill="#222"/>
    <rect x="0" y="83" width="17" height="1"  fill="#222"/>
  </g>
  <g id="decoration-inactive-bottom">
    <rect x="17" y="67" width="50" height="17" fill="#181818"/>
    <rect x="17" y="83" width="50" height="1"  fill="#222"/>
  </g>
  <g id="decoration-inactive-bottomright">
    <rect x="67" y="67" width="17" height="17" fill="#181818"/>
    <rect x="83" y="67" width="1"  height="17" fill="#222"/>
    <rect x="67" y="83" width="17" height="1"  fill="#222"/>
  </g>
</svg>
