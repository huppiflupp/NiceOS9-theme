<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Screen 1 — Finder Greeter</title>
<style>
  @font-face {
    font-family: 'ChicagoFLF';
    src: url('../fonts/ChicagoFLF.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'ChicagoFLF', 'Chicago', monospace;
  }

  /* Desktop background — platinum with subtle pattern */
  body {
    background: #6b8aad;
    display: flex;
    flex-direction: column;
  }

  /* Mac OS 9 desktop pattern overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 40%, rgba(100,130,180,0.5) 0%, transparent 70%),
      radial-gradient(ellipse 60% 70% at 70% 70%, rgba(50,70,120,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 20%, rgba(80,110,160,0.4) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── Menu Bar ── */
  .menubar {
    position: relative;
    z-index: 100;
    height: 22px;
    background: linear-gradient(to bottom, #dedad2 0%, #c8c4bc 100%);
    border-bottom: 1px solid #888;
    box-shadow: 0 1px 0 rgba(255,255,255,0.5), 0 2px 4px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    padding: 0 6px;
    gap: 0;
    user-select: none;
  }
  .menu-item {
    padding: 0 10px;
    height: 22px;
    line-height: 22px;
    font-size: 13px;
    color: #000;
    cursor: default;
    white-space: nowrap;
  }
  .menu-item:hover {
    background: #0000aa;
    color: #fff;
  }
  .menu-apple {
    font-size: 16px;
    padding: 0 12px;
    font-family: serif;
  }
  .menubar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #333;
    padding-right: 8px;
  }

  /* ── Desktop area ── */
  .desktop {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Login Window ── Mac OS 9 style ── */
  .login-window {
    width: 340px;
    border: 1px solid #222;
    box-shadow:
      1px 1px 0 rgba(255,255,255,0.5) inset,
      3px 3px 0 rgba(0,0,0,0.3),
      6px 6px 12px rgba(0,0,0,0.35);
    background: #c3c3c3;
  }

  /* Title bar */
  .titlebar {
    height: 22px;
    background: linear-gradient(to bottom, #a0a0a0 0%, #888 45%, #808080 55%, #707070 100%);
    border-bottom: 1px solid #555;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 0 28px;
  }
  .titlebar::before {
    content: '';
    position: absolute;
    top: 1px; left: 0; right: 0; height: 1px;
    background: rgba(255,255,255,0.5);
  }
  /* Stripe decoration on active title bar */
  .titlebar .stripes {
    position: absolute;
    left: 28px; right: 28px;
    top: 0; bottom: 0;
    background: repeating-linear-gradient(
      to right,
      transparent 0px, transparent 5px,
      rgba(0,0,0,0.08) 5px, rgba(0,0,0,0.08) 6px
    );
  }
  .titlebar-close {
    position: absolute;
    left: 6px; top: 4px;
    width: 14px; height: 14px;
    background: linear-gradient(135deg, #e8e4dc, #c0bdb5);
    border: 1px solid #666;
    box-shadow: 1px 1px 0 rgba(255,255,255,0.6) inset;
    cursor: default;
  }
  .titlebar-title {
    font-size: 12px;
    color: #fff;
    text-shadow: 0 -1px 0 rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.15);
    position: relative;
    z-index: 1;
    letter-spacing: 0.3px;
  }

  /* Window content */
  .window-body {
    padding: 20px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: linear-gradient(to bottom, #c8c4bc, #c0bdb5);
  }

  /* User icon */
  .user-avatar {
    width: 56px; height: 56px;
    border: 2px solid #888;
    box-shadow: 1px 1px 0 rgba(255,255,255,0.6), inset 1px 1px 2px rgba(0,0,0,0.2);
    background: linear-gradient(135deg, #d4d0c8, #b8b4ac);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .user-name-display {
    font-size: 14px;
    color: #000;
    letter-spacing: 0.3px;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, #999, transparent);
  }

  /* Input labels */
  .field-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field-label {
    font-size: 11px;
    color: #000;
    width: 70px;
    text-align: right;
    flex-shrink: 0;
  }
  /* Mac OS 9 input field */
  .mac-input {
    flex: 1;
    height: 20px;
    border: 1px solid #555;
    border-top-color: #888;
    border-left-color: #888;
    background: #fff;
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.15), 1px 1px 0 rgba(255,255,255,0.7);
    font-family: 'ChicagoFLF', monospace;
    font-size: 11px;
    padding: 0 4px;
    outline: none;
    color: #000;
  }
  .mac-input:focus {
    outline: 2px solid #0000aa;
    outline-offset: -1px;
  }
  .mac-input.password {
    letter-spacing: 4px;
    color: transparent;
    text-shadow: 0 0 0 #000;
  }

  /* Buttons row */
  .btn-row {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 4px;
  }
  /* Mac OS 9 button */
  .mac-btn {
    height: 22px;
    padding: 0 16px;
    border: 1px solid #555;
    background: linear-gradient(to bottom, #e8e4dc 0%, #c8c4bc 100%);
    box-shadow: 1px 1px 0 rgba(255,255,255,0.7) inset, 1px 1px 0 rgba(0,0,0,0.2);
    font-family: 'ChicagoFLF', monospace;
    font-size: 11px;
    color: #000;
    cursor: default;
    position: relative;
  }
  .mac-btn.default-btn {
    border: 2px solid #000;
    background: linear-gradient(to bottom, #e8e4dc 0%, #c0bdb5 100%);
  }
  .mac-btn:hover {
    filter: brightness(0.95);
  }
  .mac-btn:active {
    filter: invert(0.1);
  }
</style>
</head>
<body>
  <!-- Mac OS 9 Menu Bar -->
  <div class="menubar">
    <div class="menu-item menu-apple">&#63743;</div>
    <div class="menu-item">Finder</div>
    <div class="menu-item">File</div>
    <div class="menu-item">Edit</div>
    <div class="menu-item">View</div>
    <div class="menu-item">Special</div>
    <div class="menu-item">Help</div>
    <div class="menubar-right">
      <span>12:00 AM</span>
    </div>
  </div>

  <!-- Desktop -->
  <div class="desktop">
    <!-- Login Window -->
    <div class="login-window">
      <div class="titlebar">
        <div class="stripes"></div>
        <div class="titlebar-close"></div>
        <div class="titlebar-title">Login</div>
      </div>
      <div class="window-body">
        <!-- User icon + name -->
        <div class="user-avatar">
          <svg viewBox="0 0 48 48" width="40" height="40" xmlns="http://www.w3.org/2000/svg">
            <circle cx="24" cy="18" r="10" fill="#888"/>
            <ellipse cx="24" cy="42" rx="16" ry="10" fill="#888"/>
          </svg>
        </div>
        <div class="user-name-display">Welcome</div>

        <div class="divider"></div>

        <div class="field-group">
          <div class="field-row">
            <span class="field-label">Name:</span>
            <input class="mac-input" type="text" value="User" spellcheck="false"/>
          </div>
          <div class="field-row">
            <span class="field-label">Password:</span>
            <input class="mac-input password" type="password" value="••••••••" spellcheck="false"/>
          </div>
        </div>

        <div class="btn-row">
          <button class="mac-btn">Guest</button>
          <button class="mac-btn default-btn">Log In</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
