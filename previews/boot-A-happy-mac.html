<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boot Screen A — Happy Mac Classic</title>
<style>
  @font-face {
    font-family: 'ChicagoFLF';
    src: url('../fonts/ChicagoFLF.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #c3c3c3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'ChicagoFLF', 'Chicago', monospace;
    overflow: hidden;
  }

  /* Mac OS 9 platinum texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%),
      linear-gradient(to bottom, #d4d0c8 0%, #c3c3c3 40%, #bababa 100%);
    pointer-events: none;
  }

  .center-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  /* Happy Mac face */
  .happy-mac {
    width: 96px;
    height: 96px;
    filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.25));
  }

  .welcome-text {
    font-size: 22px;
    color: #111;
    letter-spacing: 0.5px;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  }

  /* Mac OS 9 candy-stripe progress bar */
  .progress-wrap {
    width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .progress-track {
    width: 100%;
    height: 16px;
    border: 2px solid #555;
    border-radius: 0;
    background: #fff;
    box-shadow: inset 1px 1px 0 #888, 1px 1px 0 #fff;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: repeating-linear-gradient(
      45deg,
      #0000aa 0px, #0000aa 6px,
      #6666cc 6px, #6666cc 12px
    );
    background-size: 17px 17px;
    animation: fill 4s steps(40, end) forwards, stripe 0.4s linear infinite;
  }
  @keyframes fill {
    0%   { width: 0%; }
    100% { width: 100%; }
  }
  @keyframes stripe {
    from { background-position: 0 0; }
    to   { background-position: 17px 0; }
  }

  .status-text {
    font-size: 11px;
    color: #444;
    letter-spacing: 0.3px;
    animation: statusCycle 4s steps(1) forwards;
  }
  @keyframes statusCycle {
    0%  { content: ''; }
  }

  /* Bottom credits */
  .version {
    position: fixed;
    bottom: 36px;
    font-size: 11px;
    color: #666;
    letter-spacing: 0.5px;
  }

  /* Scanning line retro effect */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.025) 2px,
      rgba(0,0,0,0.025) 4px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="center-block">

    <!-- Happy Mac SVG -->
    <svg class="happy-mac" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
      <!-- Monitor body -->
      <rect x="4" y="6" width="88" height="68" rx="6" ry="6" fill="#d4d0c8" stroke="#555" stroke-width="2"/>
      <rect x="8" y="10" width="80" height="60" rx="3" ry="3" fill="#fff" stroke="#888" stroke-width="1"/>
      <!-- Screen bezel highlight -->
      <rect x="8" y="10" width="80" height="2" fill="rgba(255,255,255,0.7)" rx="1"/>
      <!-- Happy Mac face on screen -->
      <!-- Face bg -->
      <rect x="12" y="14" width="72" height="52" rx="2" fill="#c3c3c3"/>
      <!-- Eyes -->
      <rect x="28" y="26" width="10" height="12" rx="2" fill="#111"/>
      <rect x="58" y="26" width="10" height="12" rx="2" fill="#111"/>
      <!-- Eye shine -->
      <rect x="30" y="27" width="3" height="3" fill="#fff"/>
      <rect x="60" y="27" width="3" height="3" fill="#fff"/>
      <!-- Smile -->
      <path d="M 30 46 Q 48 58 66 46" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Cheeks -->
      <ellipse cx="25" cy="47" rx="6" ry="4" fill="rgba(220,100,100,0.3)"/>
      <ellipse cx="71" cy="47" rx="6" ry="4" fill="rgba(220,100,100,0.3)"/>
      <!-- Stand -->
      <rect x="36" y="74" width="24" height="10" rx="2" fill="#b0aca4" stroke="#888" stroke-width="1"/>
      <rect x="24" y="84" width="48" height="6" rx="3" fill="#a0a09a" stroke="#777" stroke-width="1"/>
    </svg>

    <div class="welcome-text">Welcome to NiceOS 9</div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>
  </div>

  <div class="version">NiceOS 9 &nbsp;·&nbsp; KDE Plasma 6</div>
</body>
</html>
