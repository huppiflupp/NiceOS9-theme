<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Boot Screen B — Indigo Night</title>
<style>
  @font-face {
    font-family: 'ChicagoFLF';
    src: url('../fonts/ChicagoFLF.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'ChicagoFLF', 'Chicago', monospace;
  }

  /* Deep indigo background with foam-like blobs */
  body {
    background: #0d0d2b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Foam-like organic shapes in background */
  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(40,40,120,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(20,20,90,0.7) 0%, transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 50%, rgba(15,15,60,0.5) 0%, transparent 80%),
      radial-gradient(ellipse 30% 30% at 70% 20%, rgba(50,50,140,0.4) 0%, transparent 60%),
      radial-gradient(ellipse 40% 35% at 30% 80%, rgba(30,30,100,0.5) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Subtle scanlines */
  .bg::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,60,0.12) 3px, rgba(0,0,60,0.12) 4px
    );
    pointer-events: none;
  }

  .center-block {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Glowing monitor icon */
  .monitor-wrap {
    position: relative;
  }
  .glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,170,0.35) 0%, transparent 70%);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50%       { opacity: 1.0; transform: translate(-50%,-50%) scale(1.15); }
  }
  .monitor {
    width: 100px;
    height: 100px;
    position: relative;
    z-index: 1;
  }

  /* Title */
  .title {
    color: #aac0ff;
    font-size: 20px;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(100,140,255,0.7), 0 0 40px rgba(0,0,170,0.4);
  }

  /* Slim progress bar */
  .progress-wrap {
    width: 240px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(100,120,200,0.2);
    border-radius: 2px;
    overflow: hidden;
    box-shadow: 0 0 8px rgba(0,0,170,0.3);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #0000aa, #6688ff, #aac0ff);
    border-radius: 2px;
    animation: fill 4s ease-in-out forwards;
    box-shadow: 0 0 12px rgba(100,136,255,0.8);
  }
  @keyframes fill {
    0%   { width: 0%; }
    20%  { width: 15%; }
    50%  { width: 55%; }
    80%  { width: 80%; }
    100% { width: 100%; }
  }

  .status {
    font-size: 10px;
    color: rgba(150,170,255,0.6);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: blink 1.2s steps(1) infinite;
  }
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.3; }
  }

  .version {
    position: fixed;
    bottom: 32px;
    font-size: 10px;
    color: rgba(100,120,200,0.5);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="bg"></div>

  <div class="center-block">
    <div class="monitor-wrap">
      <div class="glow"></div>
      <svg class="monitor" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Monitor body with glow -->
        <defs>
          <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1a1a5e"/>
            <stop offset="1" stop-color="#0a0a30"/>
          </linearGradient>
          <filter id="screenGlow">
            <feGaussianBlur stdDeviation="1.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Outer shell -->
        <rect x="5" y="5" width="90" height="68" rx="5" ry="5"
              fill="#1e1e4a" stroke="#3a3a7a" stroke-width="1.5"/>
        <!-- Screen -->
        <rect x="10" y="9" width="80" height="58" rx="2"
              fill="url(#screenGrad)" stroke="#0000aa" stroke-width="1"/>
        <!-- Screen content: glowing NiceOS9 logo text -->
        <text x="50" y="35" text-anchor="middle"
              font-family="ChicagoFLF, Chicago, monospace"
              font-size="10" fill="#aac0ff" filter="url(#screenGlow)">NiceOS 9</text>
        <!-- Scan line on screen -->
        <rect x="10" y="38" width="80" height="1" fill="rgba(100,136,255,0.3)">
          <animate attributeName="y" from="9" to="67" dur="2s" repeatCount="indefinite"/>
        </rect>
        <!-- Stand -->
        <rect x="40" y="73" width="20" height="10" rx="2" fill="#1a1a44" stroke="#3a3a7a" stroke-width="1"/>
        <rect x="28" y="83" width="44" height="6" rx="3" fill="#161636" stroke="#333366" stroke-width="1"/>
      </svg>
    </div>

    <div class="title">NiceOS 9</div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
      <div class="status">Starting up</div>
    </div>
  </div>

  <div class="version">KDE Plasma 6 &nbsp;·&nbsp; NiceOS 9 Dark</div>
</body>
</html>
